name: Build CV

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Sync repos (skip on PR, where we only want to test the build) ──
      - name: Synchronise repos to CV
        if: github.event_name != 'pull_request'
        run: python3 scripts/sync_repos.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: deepseek/deepseek-v4-flash:free
          LLM_ENDPOINT: https://openrouter.ai/api/v1

      # ── Build ──
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false

      - name: Generate resume.json
        run: python3 scripts/tex2json.py

      - name: Upload PDF and JSON
        uses: actions/upload-artifact@v4
        with:
          name: CV
          path: |
            main.pdf
            resume.json

  release:
    if: github.ref == 'refs/heads/main' && !cancelled()
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: CV

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            main.pdf
            resume.json
          make_latest: true
          generate_release_notes: false
