name: Build CV

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Lean job CV: built BEFORE sync, so it contains only the curated
      #    content (no auto-synced personal-project long tail). ──
      - name: Compile lean job CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-job.tex
          latexmk_use_xelatex: false

      # ── Sync repos (adds the personal-project long tail to the full CV) ──
      - name: Synchronise repos to CV
        run: python3 scripts/sync_repos.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

      # ── Full website CV: built AFTER sync (exhaustive). ──
      - name: Compile full website CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false

      - name: Generate resume.json
        run: python3 scripts/tex2json.py

      - name: Upload PDFs and JSON
        uses: actions/upload-artifact@v4
        with:
          name: CV
          path: |
            main.pdf
            cv-job.pdf
            resume.json

  release:
    if: github.ref == 'refs/heads/main' && !cancelled()
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: CV

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            main.pdf
            cv-job.pdf
            resume.json
          make_latest: true
          generate_release_notes: false
