name: Synchronise Repos to CV

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run repo synchronisation script
        run: python3 scripts/sync_repos.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: deepseek/deepseek-v4-flash:free
          LLM_ENDPOINT: https://openrouter.ai/api/v1

      - name: Check for changes
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "CV Synchronisation Bot"
          git config user.email "skye+bot@casolw.space"
          git add -A
          git commit -m "chore: auto-synchronise new GitHub repos to CV"

      - name: Compile LaTeX document
        if: steps.git-check.outputs.changed == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false

      - name: Generate resume.json
        if: steps.git-check.outputs.changed == 'true'
        run: python3 scripts/tex2json.py

      - name: Push
        if: steps.git-check.outputs.changed == 'true'
        run: git push

      - name: Create/Update Release
        if: steps.git-check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            main.pdf
            resume.json
          make_latest: true
          generate_release_notes: false
